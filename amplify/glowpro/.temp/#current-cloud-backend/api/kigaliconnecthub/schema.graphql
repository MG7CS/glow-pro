type Shop @model
  @auth(rules: [
    { allow: owner },
    { allow: groups, groups: ["Admins"] },
    { allow: public, provider: apiKey, operations: [read] }
  ]) {
  id: ID!
  name: String!
  category: String!
  description: String
  neighborhood: String!
  mapLat: Float
  mapLng: Float
  whatsapp: String!
  phone: String
  coverPhotoKey: String
  galleryPhotoKeys: [String]
  instagram: String
  facebook: String
  tiktok: String
  verified: Boolean
  rating: Float
  ownerName: String
  ownerEmail: String
  referralSource: String
  recruitedBy: String
  listedSince: String
  replyTime: String
  # GlowPro — beauty / booking (optional on existing records)
  professionalType: String
  isIndependent: Boolean
  services: [String]
  priceRange: String
  bookingEnabled: Boolean
  depositRequired: Boolean
  depositAmount: Float
  yearsExperience: Int
  specialties: [String]
  languages: [String]
  portfolioPhotos: [String]
  servesAtHome: Boolean
  servesInSalon: Boolean
  reviews: [Review] @hasMany(indexName: "byShop", fields: ["id"])
  hours: [BusinessHour] @hasMany(indexName: "byShop", fields: ["id"])
  appointments: [Appointment] @hasMany(indexName: "byShop", fields: ["id"])
  vouches: [Vouch] @hasMany(indexName: "byShop", fields: ["id"])
}

# After updating schema fields, run:
# nvm use 20 && amplify push

type Review @model
  @auth(rules: [
    { allow: public, provider: apiKey, operations: [read, create] }
  ]) {
  id: ID!
  shopID: ID! @index(name: "byShop", sortKeyFields: ["id"])
  reviewerName: String!
  rating: Int!
  comment: String!
  date: String!
}

type BusinessHour @model
  @auth(rules: [
    { allow: owner },
    { allow: public, provider: apiKey, operations: [read] }
  ]) {
  id: ID!
  shopID: ID! @index(name: "byShop", sortKeyFields: ["id"])
  day: String!
  time: String!
}

type ShopEvent @model
  @auth(rules: [
    { allow: public, provider: apiKey, operations: [create, read] }
  ]) {
  id: ID!
  shopID: ID! @index(name: "byShopID", sortKeyFields: ["id"], queryField: "shopEventsByShopID")
  eventType: String!
}

type Appointment @model
  @auth(rules: [
    { allow: owner },
    { allow: public, provider: apiKey, operations: [read] }
  ]) {
  id: ID!
  shopID: ID! @index(name: "byShop", sortKeyFields: ["id"])
  customerName: String!
  customerPhone: String!
  service: String!
  date: String!
  time: String!
  status: String!
  notes: String
  depositPaid: Boolean
  totalPrice: Float
}

type Vouch @model
  @auth(rules: [
    { allow: public, provider: apiKey, operations: [read] },
    { allow: owner }
  ]) {
  id: ID!
  shopID: ID! @index(name: "byShop", sortKeyFields: ["id"])
  authorName: String!
  authorPhone: String
  rating: Int!
  comment: String
  category: String
  verified: Boolean
}
